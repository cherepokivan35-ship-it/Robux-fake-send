<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Robux - Roblox</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #F2F4F5;
            --bg-surface: #FFFFFF;
            --text-primary: #191B1D;
            --text-secondary: #393B3D;
            --text-muted: #B8B8B8;
            --border-color: #E3E3E3;
            --btn-hover: #E3E6E8;
        }

        body { margin: 0; padding: 0; background-color: var(--bg-body); color: var(--text-primary); font-family: 'Inter', sans-serif; }
        * { box-sizing: border-box; }

        /* Шапка */
        .rbx-header { background-color: var(--bg-surface); height: 40px; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .rbx-header-action { cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 8px; }
        .rbx-balance { font-weight: 700; font-size: 15px; }
        .robux-icon { width: 24px; height: 24px; }

        /* Контент */
        .rbx-container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .buy-robux-banner { width: 100%; margin-bottom: 24px; border-radius: 12px; overflow: hidden; }
        .buy-robux-banner img { width: 100%; display: block; }

        /* Сетка */
        .robux-packages-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 16px; }
        .robux-package-card { background: white; border: 1px solid var(--border-color); padding: 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .package-price-btn { background: #FFFFFF; border: 1px solid #393B3D; padding: 10px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

    <header class="rbx-header">
        <div class="rbx-header-action">
            <img src="robux.png" class="robux-icon">
            <span class="rbx-balance" id="nav-balance">2,147,483,647</span>
        </div>
    </header>

    <div class="rbx-container">
        <div class="buy-robux-banner">
            <img src="13945.jpg" alt="Robux Banner">
        </div>

        <div class="robux-packages-grid">
            <div class="robux-package-card">
                <div><strong>400 Robux</strong></div>
                <button class="package-price-btn">$ 4.99</button>
            </div>
            <div class="robux-package-card">
                <div><strong>800 Robux</strong></div>
                <button class="package-price-btn">$ 9.99</button>
            </div>
            <div class="robux-package-card">
                <div><strong>10,000 Robux</strong></div>
                <button class="package-price-btn">$ 99.99</button>
            </div>
        </div>
    </div>

</body>
</html>
